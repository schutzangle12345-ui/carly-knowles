<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Carly Knowles - Free Data Visualization Support</title>
    <meta name="description" content="Contact Carly Knowles for support with our free data visualization tools, dashboard building, and chart sharing. We help analysts and marketers get the most from their data.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0284c7;
            --color-primary-dark: #0369a1;
            --color-background: #ffffff;
            --color-surface: #f8fafc;
            --color-text: #0f172a;
            --color-text-muted: #64748b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --container-width: 1100px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header & Navigation */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f1f5f9;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        .nav-links a.active {
            color: var(--color-text);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-1px);
        }

        /* Hero Section */
        .hero {
            padding: 6rem 0 4rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Contact Section */
        .contact-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 5rem;
            padding: 4rem 0 8rem;
        }

        .contact-form-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        .success-msg {
            background-color: #f0fdf4;
            color: #166534;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border: 1px solid #bbf7d0;
        }

        /* Contact Info Column */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .info-block h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .info-block p, .info-block a {
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        .info-block a:hover {
            color: var(--color-primary);
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            fill: var(--color-text-muted);
        }

        .social-icon:hover {
            fill: var(--color-primary);
        }

        /* FAQ Section */
        .faq-section {
            background-color: var(--color-surface);
            padding: 6rem 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title h2 {
            font-size: 2.25rem;
            font-weight: 700;
        }

        .faq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .faq-item h4 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .faq-item p {
            color: var(--color-text-muted);
        }

        /* Footer */
        footer {
            padding: 5rem 0 3rem;
            border-top: 1px solid #f1f5f9;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-logo {
            margin-bottom: 1.5rem;
        }

        .footer-desc {
            color: var(--color-text-muted);
            max-width: 300px;
        }

        .footer-col h5 {
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .footer-col ul li {
            margin-bottom: 0.75rem;
        }

        .footer-col ul li a {
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        .footer-col ul li a:hover {
            color: var(--color-primary);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid #f1f5f9;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 992px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 4rem;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .faq-grid {
                grid-template-columns: 1fr;
            }
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
