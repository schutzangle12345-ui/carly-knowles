<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Carly Knowles - Democratizing Data Visualization</title>
    <meta name="description" content="Learn about the mission behind Carly Knowles: making professional data visualization accessible to everyone without coding or design skills.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0d9488; /* Sophisticated Teal */
            --color-primary-dark: #0f766e;
            --color-background: #ffffff;
            --color-surface: #f9fafb;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --container-width: 1100px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Navigation */
        nav {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #f3f4f6;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--color-primary);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-block;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }

        /* Hero Section */
        .hero {
            padding: 100px 0 60px;
            text-align: center;
            background-color: var(--color-background);
        }

        .hero h1 {
            font-size: 3.5rem;
            letter-spacing: -0.02em;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Content Sections */
        section {
            padding: 80px 0;
        }

        .section-light {
            background-color: var(--color-surface);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .image-placeholder {
            background: #e5e7eb;
            border-radius: 12px;
            aspect-ratio: 16/10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .content-block h2 {
            font-size: 2.25rem;
        }

        .content-block p {
            margin-bottom: 1.25rem;
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        /* Values Grid */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .value-card {
            padding: 2.5rem;
            background: white;
            border-radius: 12px;
            border: 1px solid #f3f4f6;
            transition: var(--transition);
        }

        .value-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-color: var(--color-primary);
        }

        .value-card h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--color-primary);
        }

        /* CTA Section */
        .cta-section {
            background-color: var(--color-primary);
            color: white;
            text-align: center;
            border-radius: 16px;
            padding: 60px;
            margin-bottom: 80px;
        }

        .cta-section h2 {
            color: white;
        }

        .cta-section form {
            display: flex;
            gap: 1rem;
            justify-content: center;
            max-width: 500px;
            margin: 2rem auto 0;
        }

        .cta-section input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .cta-section .btn-submit {
            background: var(--color-text);
            color: white;
        }

        /* Footer */
        footer {
            padding: 60px 0 40px;
            border-top: 1px solid #f3f4f6;
            color: var(--color-text-muted);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 40px;
        }

        .footer-logo {
            margin-bottom: 1.5rem;
            display: block;
        }

        .footer-links h4 {
            color: var(--color-text);
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            border-top: 1px solid #f3f4f6;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .values-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .nav-links {
                display: none;
            }
            .cta-section form {
                flex-direction: column;
            }
        }
    </style>
</head>
