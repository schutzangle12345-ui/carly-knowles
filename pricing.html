<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing | Carly Knowles - Free Data Visualization & Dashboard Builder</title>
    <meta name="description" content="Simple, transparent pricing for Carly Knowles. Start building interactive charts and dashboards for free. No coding required.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0d9488;
            --color-primary-dark: #0f766e;
            --color-background: #ffffff;
            --color-surface: #f9fafb;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --container-width: 1100px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Navigation */
        header {
            height: 80px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--color-primary);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
            border: none;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .btn-outline {
            border: 1px solid #e5e7eb;
            background: transparent;
        }

        .btn-outline:hover {
            background: #f3f4f6;
        }

        /* Hero Section */
        .pricing-hero {
            padding: 6rem 0 4rem;
            text-align: center;
        }

        .pricing-hero h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .pricing-hero p {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Pricing Grid */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .pricing-card {
            padding: 3rem 2.5rem;
            border: 1px solid #f3f4f6;
            border-radius: 16px;
            background: var(--color-background);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .pricing-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .pricing-card.popular {
            border: 2px solid var(--color-primary);
            position: relative;
        }

        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .plan-name {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .plan-price span {
            font-size: 1rem;
            color: var(--color-text-muted);
            font-weight: 400;
        }

        .plan-features {
            margin-bottom: 2.5rem;
            flex-grow: 1;
        }

        .plan-features li {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            color: var(--color-text-muted);
        }

        .plan-features li::before {
            content: "✓";
            margin-right: 12px;
            color: var(--color-primary);
            font-weight: bold;
        }

        /* Comparison Table */
        .comparison-section {
            padding-bottom: 6rem;
        }

        .comparison-section h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 3rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #f3f4f6;
        }

        th {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
        }

        td:first-child {
            font-weight: 500;
            width: 40%;
        }

        /* FAQ */
        .faq-section {
            background-color: var(--color-surface);
            padding: 6rem 0;
        }

        .faq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 3rem;
        }

        .faq-item h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }

        .faq-item p {
            color: var(--color-text-muted);
        }

        /* CTA Form Section */
        .cta-section {
            padding: 8rem 0;
            text-align: center;
        }

        .form-container {
            max-width: 500px;
            margin: 2rem auto 0;
            background: var(--color-surface);
            padding: 2.5rem;
            border-radius: 12px;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: inherit;
        }

        /* Footer */
        footer {
            padding: 5rem 0 3rem;
            background: #ffffff;
            border-top: 1px solid #f3f4f6;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-brand p {
            margin-top: 1rem;
            color: var(--color-text-muted);
            max-width: 300px;
        }

        .footer-heading {
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-links a {
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        .footer-links a:hover {
            color: var(--color-primary);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid #f3f4f6;
            color: var(--color-text-muted);
            font-size: 0.875rem;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
            transition: var(--transition);
        }

        .social-icons svg:hover {
            fill: var(--color-primary);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .pricing-hero h1 { font-size: 2.25rem; }
            .footer-grid { grid-template-columns: 1fr; gap: 2.5rem; }
            .faq-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
