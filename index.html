<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carly Knowles | Free Data Visualization & Dashboard Builder</title>
    <meta name="description" content="Create stunning charts and interactive dashboards quickly without coding. The free no-code BI tool for analysts, marketers, and product managers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0ea5e9;
            --color-primary-dark: #0284c7;
            --color-background: #ffffff;
            --color-surface: #f9fafb;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --container-width: 1100px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 100px 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            font-size: 1rem;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid #e5e7eb;
            color: var(--color-text);
        }

        .btn-outline:hover {
            background-color: var(--color-surface);
            border-color: #d1d5db;
        }

        /* Navigation */
        nav {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f3f4f6;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 120px 0 80px;
        }

        .hero h1 {
            font-size: 3.5rem;
            max-width: 800px;
            margin: 0 auto 24px;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .hero-btns {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* Features */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .feature-card {
            padding: 32px;
            border-radius: 12px;
            background: var(--color-surface);
            border: 1px solid #f1f5f9;
        }

        .feature-card h3 {
            margin: 16px 0 12px;
            font-size: 1.25rem;
        }

        .feature-card p {
            color: var(--color-text-muted);
        }

        /* How It Works */
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 60px;
            margin-top: 60px;
        }

        .step {
            position: relative;
        }

        .step-number {
            font-size: 3rem;
            font-weight: 800;
            color: #e5e7eb;
            line-height: 1;
            margin-bottom: 16px;
        }

        .step h3 {
            margin-bottom: 12px;
        }

        /* Pricing */
        .pricing-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .pricing-card {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        .pricing-card.popular {
            border-color: var(--color-primary);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.1);
        }

        .price {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 16px 0;
        }

        .price span {
            font-size: 1rem;
            color: var(--color-text-muted);
            font-weight: 400;
        }

        .pricing-features {
            margin: 24px 0 40px;
            flex-grow: 1;
        }

        .pricing-features li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--color-text-muted);
        }

        /* Testimonials */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .testimonial-card {
            padding: 30px;
            border-left: 4px solid var(--color-primary);
            background: var(--color-surface);
        }

        .testimonial-text {
            font-style: italic;
            margin-bottom: 16px;
            color: var(--color-text);
        }

        .testimonial-author {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* CTA Form Section */
        .cta-section {
            background-color: var(--color-surface);
            border-radius: 24px;
            padding: 80px 40px;
            text-align: center;
        }

        .form-container {
            max-width: 500px;
            margin: 40px auto 0;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: 2px solid var(--color-primary);
            border-color: transparent;
        }

        .success-msg {
            color: #059669;
            font-weight: 600;
            margin-top: 16px;
        }

        /* Footer */
        footer {
            padding: 80px 0 40px;
            border-top: 1px solid #f3f4f6;
            margin-top: 60px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .footer-logo p {
            margin-top: 16px;
            color: var(--color-text-muted);
            max-width: 240px;
        }

        .footer-links h4 {
            margin-bottom: 20px;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            color: var(--color-text-muted);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            border-top: 1px solid #f3f4f6;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .social-icons {
            display: flex;
            gap: 16px;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .footer-grid { grid-template-columns: 1fr 1fr; }
            .section { padding: 60px 0; }
        }
    </style>
</head>
